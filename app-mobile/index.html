<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Portaria D2P">
    <link rel="manifest" href="manifest.json">
    <title>Gestão Portaria — D2P</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html, body { height:100%; background:#000; font-family:'Segoe UI',Arial,sans-serif; color:#fff; }

        /* ── TELA LOGIN ── */
        #tela-login {
            min-height:100vh;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            padding:32px 24px;
            background:radial-gradient(ellipse at top, #1a1a1a 0%, #000 70%);
        }
        .logo-renault {
            margin-bottom:24px;
        }
        .logo-renault svg { width:80px; height:80px; }
        .login-titulo {
            font-size:22px; font-weight:800; color:#f5c518;
            text-align:center; letter-spacing:1px; line-height:1.3;
            margin-bottom:36px;
        }
        .login-campo { width:100%; max-width:320px; margin-bottom:14px; }
        .login-campo label { display:block; font-size:11px; color:#f5c518; font-weight:700; letter-spacing:1px; margin-bottom:6px; }
        .login-campo input {
            width:100%; padding:14px 16px;
            background:rgba(255,255,255,0.07);
            border:1.5px solid rgba(255,255,255,0.15);
            border-radius:10px; color:#fff; font-size:15px; outline:none;
        }
        .login-campo input:focus { border-color:#f5c518; }
        .login-campo input::placeholder { color:rgba(255,255,255,.3); }
        .btn-login {
            width:100%; max-width:320px; padding:15px;
            background:#f5c518; color:#000;
            border:none; border-radius:10px;
            font-size:15px; font-weight:800; letter-spacing:2px;
            cursor:pointer; margin-top:8px;
        }
        .btn-login:active { background:#d4a800; }
        .login-erro { color:#e74c3c; font-size:13px; margin-top:12px; text-align:center; display:none; }

        /* ── TELA FORM ── */
        #tela-form { display:none; min-height:100vh; background:#111; }

        .app-header {
            background:#000; padding:14px 20px;
            display:flex; align-items:center; justify-content:space-between;
            position:sticky; top:0; z-index:100;
            border-bottom:2px solid #f5c518;
        }
        .app-header-logo { display:flex; align-items:center; gap:10px; }
        .app-header-logo svg { width:28px; height:28px; }
        .app-header-titulo { font-size:13px; font-weight:800; color:#f5c518; letter-spacing:1px; }
        .app-header-user { font-size:11px; color:rgba(255,255,255,.6); }
        .btn-sair { background:none; border:none; color:#f5c518; font-size:12px; font-weight:700; cursor:pointer; padding:6px 10px; }

        .form-body { padding:20px 16px 40px; max-width:500px; margin:0 auto; }

        .form-group { margin-bottom:18px; }
        .form-label {
            display:block; font-size:11px; font-weight:700;
            color:#f5c518; letter-spacing:1px; text-transform:uppercase; margin-bottom:7px;
        }
        .form-label span { color:#e74c3c; margin-left:2px; }
        .form-input, .form-select {
            width:100%; padding:13px 14px;
            background:rgba(255,255,255,0.06);
            border:1.5px solid rgba(255,255,255,0.15);
            border-radius:10px; color:#fff; font-size:15px; outline:none;
            appearance:none; -webkit-appearance:none;
        }
        .form-input:focus, .form-select:focus { border-color:#f5c518; background:rgba(255,255,255,0.09); }
        .form-input::placeholder { color:rgba(255,255,255,.3); }
        .form-select option { background:#222; color:#fff; }

        .select-wrap { position:relative; }
        .select-wrap::after {
            content:'▾'; position:absolute; right:14px; top:50%;
            transform:translateY(-50%); color:#f5c518; pointer-events:none; font-size:16px;
        }

        .radio-group { display:flex; gap:12px; }
        .radio-btn {
            flex:1; padding:13px; border-radius:10px; text-align:center;
            border:1.5px solid rgba(255,255,255,0.15);
            background:rgba(255,255,255,0.06);
            color:rgba(255,255,255,.6); font-size:14px; font-weight:700;
            cursor:pointer; transition:all .15s; user-select:none;
        }
        .radio-btn.selecionado { background:#f5c518; color:#000; border-color:#f5c518; }

        .btn-salvar {
            width:100%; padding:16px;
            background:#f5c518; color:#000;
            border:none; border-radius:12px;
            font-size:16px; font-weight:800; letter-spacing:2px;
            cursor:pointer; margin-top:10px;
        }
        .btn-salvar:active { background:#d4a800; }
        .btn-limpar {
            width:100%; padding:14px;
            background:rgba(255,255,255,0.08); color:#fff;
            border:1.5px solid rgba(255,255,255,0.2); border-radius:12px;
            font-size:14px; font-weight:700; cursor:pointer; margin-top:10px;
        }

        /* ── MODAL NOTIF ── */
        #modal-notif {
            display:none; position:fixed; inset:0;
            background:rgba(0,0,0,.8); z-index:9999;
            align-items:center; justify-content:center; padding:24px;
        }
        #modal-notif.show { display:flex; }
        .modal-card {
            background:#1a1a1a; border-radius:16px; padding:32px 24px;
            width:100%; max-width:320px; text-align:center;
            border:1px solid rgba(255,255,255,.1);
        }
        .modal-icon { font-size:48px; margin-bottom:12px; }
        .modal-msg { font-size:15px; color:#fff; margin-bottom:24px; line-height:1.5; }
        .modal-ok {
            background:#f5c518; color:#000; border:none;
            border-radius:10px; padding:13px 40px;
            font-size:14px; font-weight:800; cursor:pointer; width:100%;
        }
    </style>
</head>
<body>

<!-- ── TELA LOGIN ─────────────────────────────────────────────────────────── -->
<div id="tela-login">
    <div class="logo-renault">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="50,5 85,27 85,73 50,95 15,73 15,27" fill="none" stroke="#f5c518" stroke-width="3"/>
            <polygon points="50,18 72,31 72,69 50,82 28,69 28,31" fill="none" stroke="#fff" stroke-width="2"/>
            <polygon points="50,31 60,37 60,63 50,69 40,63 40,37" fill="#f5c518"/>
        </svg>
    </div>
    <div class="login-titulo">Gestão<br>Portaria CVU</div>
    <div class="login-campo">
        <label>Login</label>
        <input type="text" id="login-user" placeholder="Login" autocomplete="off" autocapitalize="none">
    </div>
    <div class="login-campo">
        <label>Senha</label>
        <input type="password" id="login-senha" placeholder="Senha">
    </div>
    <button class="btn-login" onclick="autenticar()">ACESSAR</button>
    <div class="login-erro" id="login-erro">Usuário ou senha incorretos.</div>
</div>

<!-- ── TELA FORMULÁRIO ────────────────────────────────────────────────────── -->
<div id="tela-form">
    <div class="app-header">
        <div class="app-header-logo">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <polygon points="50,5 85,27 85,73 50,95 15,73 15,27" fill="none" stroke="#f5c518" stroke-width="4"/>
                <polygon points="50,22 68,33 68,67 50,78 32,67 32,33" fill="none" stroke="#fff" stroke-width="3"/>
                <polygon points="50,35 62,42 62,58 50,65 38,58 38,42" fill="#f5c518"/>
            </svg>
            <div class="app-header-titulo">CONTROLE DE ACESSO</div>
        </div>
        <button class="btn-sair" onclick="sair()">SAIR</button>
    </div>
    <div class="app-header-user" style="background:#111; padding:6px 20px; font-size:11px; color:rgba(255,255,255,.4);">
        Operador: <span id="nome-operador"></span>
    </div>

    <div class="form-body">

        <div class="form-group">
            <label class="form-label">Data <span>*</span></label>
            <input type="date" class="form-input" id="f-data">
        </div>

        <div class="form-group">
            <label class="form-label">Modelo <span>*</span></label>
            <input type="text" class="form-input" id="f-modelo" placeholder="Ex: KWID, SANDERO...">
        </div>

        <div class="form-group">
            <label class="form-label">Chassi <span>*</span></label>
            <input type="text" class="form-input" id="f-chassi" placeholder="Número do chassi" autocapitalize="characters">
        </div>

        <div class="form-group">
            <label class="form-label">Placa <span>*</span></label>
            <input type="text" class="form-input" id="f-placa" placeholder="AAA-0000" autocapitalize="characters">
        </div>

        <div class="form-group">
            <label class="form-label">Número SV <span>*</span></label>
            <input type="text" class="form-input" id="f-numero-sv" placeholder="Nº SV">
        </div>

        <div class="form-group">
            <label class="form-label">Nome do Motorista <span>*</span></label>
            <input type="text" class="form-input" id="f-motorista" placeholder="Nome completo" autocapitalize="words">
        </div>

        <div class="form-group">
            <label class="form-label">Placa / Tipo <span>*</span></label>
            <div class="radio-group">
                <div class="radio-btn" onclick="selecionar(this,'f-placa-tipo','VERDE')">VERDE</div>
                <div class="radio-btn" onclick="selecionar(this,'f-placa-tipo','CINZA')">CINZA</div>
            </div>
            <input type="hidden" id="f-placa-tipo">
        </div>

        <div class="form-group">
            <label class="form-label">STEP <span>*</span></label>
            <div class="radio-group">
                <div class="radio-btn" onclick="selecionar(this,'f-step','SIM')">SIM</div>
                <div class="radio-btn" onclick="selecionar(this,'f-step','NÃO')">NÃO</div>
            </div>
            <input type="hidden" id="f-step">
        </div>

        <div class="form-group">
            <label class="form-label">Liga Leve <span>*</span></label>
            <div class="radio-group">
                <div class="radio-btn" onclick="selecionar(this,'f-liga-leve','SIM')">SIM</div>
                <div class="radio-btn" onclick="selecionar(this,'f-liga-leve','NÃO')">NÃO</div>
            </div>
            <input type="hidden" id="f-liga-leve">
        </div>

        <div class="form-group">
            <label class="form-label">Multimídia <span>*</span></label>
            <div class="radio-group">
                <div class="radio-btn" onclick="selecionar(this,'f-multimidia','SIM')">SIM</div>
                <div class="radio-btn" onclick="selecionar(this,'f-multimidia','NÃO')">NÃO</div>
            </div>
            <input type="hidden" id="f-multimidia">
        </div>

        <div class="form-group">
            <label class="form-label">Acesso <span>*</span></label>
            <div class="radio-group">
                <div class="radio-btn" onclick="selecionar(this,'f-acesso','ENTRADA')">ENTRADA</div>
                <div class="radio-btn" onclick="selecionar(this,'f-acesso','SAÍDA')">SAÍDA</div>
            </div>
            <input type="hidden" id="f-acesso">
        </div>

        <div class="form-group">
            <label class="form-label">Portaria <span>*</span></label>
            <div class="select-wrap">
                <select class="form-select" id="f-portaria">
                    <option value="">Selecione</option>
                    <option>PORTARIA 2 CVP</option>
                    <option>PORTARIA 5 CVU</option>
                    <option>PORTARIA 6 HORSE</option>
                    <option>PORTARIA 8 HORSE</option>
                    <option>ACESSO LESTE</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Observação</label>
            <input type="text" class="form-input" id="f-obs" placeholder="Caso tenha...">
        </div>

        <button class="btn-salvar" onclick="salvarRegistro()">REGISTRAR ACESSO</button>
        <button class="btn-limpar" onclick="limparForm()">LIMPAR</button>
    </div>
</div>

<!-- MODAL -->
<div id="modal-notif">
    <div class="modal-card">
        <div class="modal-icon" id="modal-icon"></div>
        <div class="modal-msg" id="modal-msg"></div>
        <button class="modal-ok" onclick="fecharModal()">OK</button>
    </div>
</div>

<script src="../conexao/config.js?v=2"></script>
<script src="../conexao/crypto.js?v=2"></script>
<script src="js/app.js?v=1"></script>
</body>
</html>
