<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Acesso Gestor">
    <link rel="manifest" href="manifest.json">
    <title>Acesso de Gestor — D2P</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html, body { height:100%; font-family:'Segoe UI',Arial,sans-serif; background:#f0f2f5; }

        /* ── TELA PRINCIPAL ── */
        #tela-principal {
            display:none; min-height:100vh; flex-direction:column;
            background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }

        /* Header */
        .app-header {
            padding:16px 20px;
            display:flex; align-items:center; justify-content:space-between;
            background:rgba(0,0,0,0.3);
            border-bottom:1px solid rgba(255,255,255,0.08);
        }
        .app-header-left { display:flex; align-items:center; gap:12px; }
        .app-header-titulo {
            font-size:11px; font-weight:700; color:rgba(255,255,255,0.7);
            letter-spacing:2px; text-transform:uppercase;
        }
        .btn-sair {
            background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2);
            color:#fff; font-size:11px; font-weight:700; cursor:pointer;
            padding:6px 14px; border-radius:20px; letter-spacing:1px;
        }
        .btn-sair:active { background:rgba(255,255,255,0.2); }

        /* Área central */
        .scan-area {
            flex:1; display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            padding:32px 24px; gap:0;
        }

        /* Card de busca */
        .busca-card {
            width:100%; max-width:420px;
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.12);
            border-radius:24px;
            padding:36px 32px;
            backdrop-filter:blur(12px);
            box-shadow:0 20px 60px rgba(0,0,0,0.4);
        }

        .busca-card-titulo {
            text-align:center; margin-bottom:8px;
        }
        .busca-card-titulo span {
            font-size:13px; font-weight:700; color:rgba(255,255,255,0.5);
            letter-spacing:2px; text-transform:uppercase;
        }
        .busca-card-subtitulo {
            font-size:22px; font-weight:800; color:#fff;
            text-align:center; margin-bottom:32px; letter-spacing:0.5px;
        }

        .placa-label {
            font-size:10px; font-weight:700; color:rgba(255,255,255,0.5);
            letter-spacing:2px; text-transform:uppercase; margin-bottom:10px;
            display:block;
        }
        .placa-input {
            width:100%; padding:18px 20px;
            background:rgba(255,255,255,0.08);
            border:1.5px solid rgba(255,255,255,0.15);
            border-radius:14px; color:#fff;
            font-size:24px; font-weight:800;
            text-align:center; letter-spacing:6px; text-transform:uppercase;
            outline:none; margin-bottom:20px;
            transition:border-color .2s, background .2s;
        }
        .placa-input:focus {
            border-color:rgba(255,255,255,0.5);
            background:rgba(255,255,255,0.12);
        }
        .placa-input::placeholder {
            color:rgba(255,255,255,0.2); font-size:18px;
            letter-spacing:4px; font-weight:400;
        }

        .btn-buscar {
            width:100%; padding:18px;
            background:linear-gradient(135deg, #e94560 0%, #c0392b 100%);
            color:#fff; border:none; border-radius:14px;
            font-size:15px; font-weight:800; letter-spacing:3px;
            cursor:pointer; text-transform:uppercase;
            box-shadow:0 8px 24px rgba(233,69,96,0.4);
            transition:transform .1s, box-shadow .1s;
        }
        .btn-buscar:active {
            transform:scale(0.98);
            box-shadow:0 4px 12px rgba(233,69,96,0.3);
        }

        /* Rodapé do card */
        .busca-card-footer {
            text-align:center; margin-top:20px;
            font-size:11px; color:rgba(255,255,255,0.25);
            letter-spacing:1px;
        }

        /* ── TELA RESULTADO ── */
        #tela-resultado {
            display:none; position:fixed; inset:0; z-index:500;
            flex-direction:column; align-items:center; justify-content:center;
            padding:32px 24px; text-align:center;
        }
        #tela-resultado.liberado { background:linear-gradient(160deg,#0a5c2e,#0d7a3e); }
        #tela-resultado.negado   { background:linear-gradient(160deg,#7a0a0a,#a01010); }

        .result-icon { font-size:72px; margin-bottom:16px; }
        .result-status { font-size:28px; font-weight:900; letter-spacing:4px; margin-bottom:20px; color:#fff; }
        .result-placa { font-size:32px; font-weight:900; letter-spacing:6px; color:rgba(255,255,255,0.9); margin-bottom:28px; }
        .result-card {
            background:rgba(255,255,255,0.12); border-radius:20px;
            padding:24px 28px; width:100%; max-width:340px;
            text-align:left; margin-bottom:28px;
            border:1px solid rgba(255,255,255,0.15);
        }
        .result-field { margin-bottom:12px; }
        .result-field:last-child { margin-bottom:0; }
        .result-field-label { font-size:10px; font-weight:700; color:rgba(255,255,255,.5); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:4px; }
        .result-field-value { font-size:18px; font-weight:700; color:#fff; }

        .btns-acesso { display:flex; gap:14px; width:100%; max-width:340px; margin-bottom:18px; }
        .btn-entrada { flex:1; padding:18px; background:rgba(255,255,255,0.9); color:#0a5c2e; border:none; border-radius:14px; font-size:15px; font-weight:900; cursor:pointer; letter-spacing:1px; }
        .btn-entrada:active { background:rgba(255,255,255,0.7); }
        .btn-saida   { flex:1; padding:18px; background:rgba(0,0,0,0.3); color:#fff; border:2px solid rgba(255,255,255,0.4); border-radius:14px; font-size:15px; font-weight:900; cursor:pointer; letter-spacing:1px; }
        .btn-saida:active { background:rgba(0,0,0,0.5); }

        .btn-voltar {
            padding:14px 40px; background:rgba(255,255,255,0.12);
            color:#fff; border:1px solid rgba(255,255,255,0.25);
            border-radius:12px; font-size:14px; font-weight:700;
            cursor:pointer; letter-spacing:1px;
        }
        .btn-voltar:active { background:rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<!-- LOGIN DESATIVADO -->

<!-- ── PRINCIPAL ──────────────────────────────────────────────────────────── -->
<div id="tela-principal">
    <div class="app-header">
        <div class="app-header-left">
            <img src="https://supabase.laminlpp.com.br/storage/v1/object/public/assets/logo_rdb.png" alt="Logo" style="height:36px; width:auto;">
            <div class="app-header-titulo">Acesso de Gestor</div>
        </div>
        <div style="display:flex;gap:8px">
            <button class="btn-sair" onclick="location.href='admin.html'" style="background:transparent;border-color:transparent;font-size:16px;padding:4px 8px;">⚙️</button>
            <button class="btn-sair" onclick="sair()">SAIR</button>
        </div>
    </div>

    <div class="scan-area">
        <div class="busca-card">
            <div class="busca-card-titulo"><span>Consulta de Veículo</span></div>
            <div class="busca-card-subtitulo">Digite a placa</div>

            <label class="placa-label">Placa do veículo</label>
            <input type="text" class="placa-input" id="placa-manual"
                   placeholder="AAA-0000" maxlength="8"
                   autocapitalize="characters" autocomplete="off">

            <button class="btn-buscar" onclick="buscarPlaca()">🔍 &nbsp;BUSCAR</button>

            <div class="busca-card-footer">Operador: <span id="nome-operador"></span></div>
        </div>
    </div>
</div>

<!-- ── RESULTADO ──────────────────────────────────────────────────────────── -->
<div id="tela-resultado">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-status" id="result-status"></div>
    <div class="result-placa" id="result-placa"></div>
    <div class="result-card" id="result-card"></div>
    <div class="btns-acesso" id="btns-acesso" style="display:none">
        <button class="btn-entrada" onclick="registrarAcesso('ENTRADA')">↓ ENTRADA</button>
        <button class="btn-saida"   onclick="registrarAcesso('SAÍDA')">↑ SAÍDA</button>
    </div>
    <button class="btn-voltar" onclick="voltarScan()">← NOVA CONSULTA</button>
</div>

<script src="../conexao/config.js?v=2"></script>
<script src="../conexao/db.js?v=2"></script>
<script src="../conexao/crypto.js?v=2"></script>
<script src="js/app.js?v=2"></script>
</body>
</html>
