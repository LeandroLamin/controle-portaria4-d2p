<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D2P - Migração de Segurança</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Reforçando cores para não sumirem no fundo */
        body { background-color: #121212 !important; color: #ffffff !important; padding-top: 50px; }
        .card { background-color: #1e1e1e !important; border: 1px solid #444 !important; color: #ffffff !important; border-radius: 15px; }
        .form-label { color: #ffffff !important; font-weight: bold; }
        .form-control { background-color: #2b2b2b !important; border: 1px solid #555 !important; color: #ffffff !important; }
        .form-control::placeholder { color: #888; }
        .btn-primary { background-color: #0d6efd !important; border: none !important; font-weight: bold; }
        .text-muted { color: #aaaaaa !important; }
        h4 { color: #ffffff !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg p-4">
                    <h4 class="text-center mb-4">🛡️ Migração de Senha</h4>
                    <p class="text-muted text-center" style="font-size: 0.85rem;">
                        Converte o acesso para o padrão de segurança máxima (PBKDF2).
                    </p>
                    
                    <form id="formMigracao">
                        <div class="mb-3">
                            <label class="form-label">Login</label>
                            <input type="text" id="login" class="form-control" placeholder="Ex: leandro" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Senha (Atual ou Nova)</label>
                            <input type="password" id="nova_senha" class="form-control" placeholder="Digite a senha" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 p-2" id="btnMigrar">
                            ATUALIZAR SEGURANÇA
                        </button>
                    </form>

                    <div id="status" class="mt-3 text-center fw-bold"></div>
                    
                    <div class="text-center mt-4 border-top pt-3">
                        <a href="index.html" style="color: #0d6efd; text-decoration: none; font-size: 0.85rem;">← Voltar ao Início</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "D2P-2025-9xKmPv3nLqRw7j"; //
        const WEBHOOK_URL = "https://n8n.laminlpp.com.br/webhook-test/mudar-acesso-d2p"; //

        document.getElementById('formMigracao').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnMigrar');
            const status = document.getElementById('status');
            const login = document.getElementById('login').value.toLowerCase().trim();
            const nova_senha = document.getElementById('nova_senha').value;

            btn.disabled = true;
            status.innerText = "⏳ Processando...";
            status.style.color = "#ffc107";

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        login: login,
                        nova_senha: nova_senha,
                        _api_key: API_KEY
                    })
                });

                const data = await response.json();
                if (data.ok) {
                    status.innerText = "✅ Usuário migrado com sucesso!";
                    status.style.color = "#198754";
                    document.getElementById('formMigracao').reset();
                } else {
                    status.innerText = "❌ Erro: " + (data.erro || "Falha");
                    status.style.color = "#dc3545";
                }
            } catch (err) {
                status.innerText = "❌ Erro de conexão com n8n";
                status.style.color = "#dc3545";
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
