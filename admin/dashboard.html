<!DOCTYPE html>
<html lang="pt-br" class="notranslate">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<title>Dashboard D2P — Portaria 04</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #09090b;
    --surface: #18181b;
    --border:  #27272a;
    --border2: #3f3f46;
    --muted:   #71717a;
    --sub:     #52525b;
    --text:    #f4f4f5;
    --text2:   #d4d4d8;
    --text3:   #a1a1aa;
    --green:   #4ade80;
    --green-bg:#22c55e26;
    --red:     #f87171;
    --red-bg:  #ef444426;
    --blue:    #60a5fa;
    --blue-bg: #2563eb33;
    --amber:   #fbbf24;
    --amber-bg:#f59e0b33;
    --radius:  12px;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(24,24,27,.85);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-title { font-size: 14px; font-weight: 700; letter-spacing: .05em; }
  .header-sub { font-size: 11px; color: var(--muted); }

  #relogio { font-size: 13px; font-family: monospace; font-weight: 700; color: var(--text2); }

  .btn-nav {
    background: var(--border); color: var(--text2);
    border: none; cursor: pointer; padding: 8px 16px; border-radius: 6px;
    font-size: 12px; font-weight: 600; text-decoration: none; transition: 0.2s;
  }
  .btn-nav:hover { background: var(--border2); color: white; }

  main { max-width: 1300px; margin: 0 auto; padding: 30px; display: flex; flex-direction: column; gap: 25px; }

  /* MÉTRICAS */
  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 25px; display: flex; align-items: center; justify-content: space-between;
  }
  .card-label { font-size: 11px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .card-value { font-size: 38px; font-weight: 800; color: var(--text); }
  .card-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
  .card-icon.blue { background: var(--blue-bg); color: var(--blue); }
  .card-icon.green { background: var(--green-bg); color: var(--green); }
  .card-icon.amber { background: var(--amber-bg); color: var(--amber); }

  /* PAINEL DUPLO */
  .painel-duplo { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .caixa { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .caixa-header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .caixa-header h3 { font-size: 14px; font-weight: 600; }

  .scroll-area { overflow-y: auto; max-height: 300px; }
  .item { display: flex; align-items: center; gap: 15px; padding: 12px 20px; border-bottom: 1px solid rgba(39,39,42,.5); }
  .item:last-child { border-bottom: none; }
  .item:hover { background: rgba(39,39,42,.4); }

  /* TABELA */
  .tabela-wrap { overflow-x: auto; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
  table { width: 100%; border-collapse: collapse; min-width: 800px; }
  th { text-align: left; padding: 15px; font-size: 11px; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); }
  td { padding: 12px 15px; font-size: 13px; border-bottom: 1px solid rgba(39,39,42,.5); }

  .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; }
  .badge-ent { background: var(--green-bg); color: var(--green); }
  .badge-sai { background: var(--red-bg); color: var(--red); }

</style>
</head>
<body>

<header>
  <div class="header-left">
    <div>
      <div class="header-title">D2P-BRAZIL</div>
      <div class="header-sub">Painel Administrativo Master</div>
    </div>
  </div>
  <div style="display: flex; align-items: center; gap: 20px;">
    <div id="relogio">00:00:00</div>
    <a href="gestao.html" class="btn-nav">GESTÃO USUÁRIOS</a>
    <a href="../index.html" class="btn-nav" style="background: var(--red-bg); color: var(--red);">SAIR</a>
  </div>
</header>

<main>
  <div class="cards">
    <div class="card">
      <div><div class="card-label">Total Acessos Hoje</div><div class="card-value" id="card-total">0</div></div>
      <div class="card-icon blue">📊</div>
    </div>
    <div class="card">
      <div><div class="card-label">Entradas Ativas</div><div class="card-value" id="card-entradas">0</div></div>
      <div class="card-icon green">↓</div>
    </div>
    <div class="card">
      <div><div class="card-label">Saídas Registradas</div><div class="card-value" id="card-saidas">0</div></div>
      <div class="card-icon amber">↑</div>
    </div>
  </div>

  <div class="painel-duplo">
    <div class="caixa">
      <div class="caixa-header"><h3>Movimentação em Tempo Real</h3></div>
      <div class="scroll-area" id="lista-eventos"></div>
    </div>
    <div class="caixa">
      <div class="caixa-header"><h3>No Local Agora</h3></div>
      <div class="scroll-area" id="lista-presentes"></div>
    </div>
  </div>

  <div class="tabela-wrap">
    <table>
      <thead>
        <tr>
          <th>Data</th><th>Hora</th><th>Nome</th><th>Empresa</th><th>Tipo</th><th>Vigilante</th>
        </tr>
      </thead>
      <tbody id="corpo-tabela"></tbody>
    </table>
  </div>
</main>

<script src="../conexao/config.js"></script>
<script src="../conexao/db.js"></script>
<script>
  // Atualiza Relógio
  setInterval(() => {
    document.getElementById('relogio').innerText = new Date().toLocaleTimeString('pt-BR');
  }, 1000);

  // Carrega Dados
  async function carregarDados() {
    const dados = await dbBuscar('acessos', {}, { order: 'id.desc' });
    if (!dados) return;

    const hoje = new Date().toISOString().slice(0, 10);
    const deHoje = dados.filter(x => x.data === hoje);

    document.getElementById('card-total').innerText = deHoje.length;
    document.getElementById('card-entradas').innerText = deHoje.filter(x => x.acesso === 'ENTRADA').length;
    document.getElementById('card-saidas').innerText = deHoje.filter(x => x.acesso !== 'ENTRADA').length;

    // Renderiza Tempo Real
    document.getElementById('lista-eventos').innerHTML = deHoje.slice(0, 10).map(x => `
      <div class="item">
        <div style="flex:1"><b>${x.nome}</b><br><small style="color:var(--muted)">${x.empresa}</small></div>
        <div class="status-badge ${x.acesso === 'ENTRADA' ? 'badge-ent' : 'badge-sai'}">${x.acesso}</div>
        <div style="font-family:monospace; font-size:11px;">${x.hora}</div>
      </div>
    `).join('');

    // Renderiza Histórico
    document.getElementById('corpo-tabela').innerHTML = dados.slice(0, 20).map(x => `
      <tr>
        <td>${x.data}</td><td>${x.hora}</td><td><b>${x.nome}</b></td>
        <td>${x.empresa}</td><td><span class="status-badge ${x.acesso === 'ENTRADA' ? 'badge-ent' : 'badge-sai'}">${x.acesso}</span></td>
        <td>${x.vigilante || ''}</td>
      </tr>
    `).join('');
  }

  document.addEventListener('DOMContentLoaded', carregarDados);
</script>
</body>
</html>
