<!DOCTYPE html>
<html lang="pt-br" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <title>MASTER - D2P Brazil</title>
    
    <style>
        /* ============================================================
           DARK THEME MASTER - CENTRALIZADO & PROTEGIDO
           ============================================================ */
        :root {
            --bg-body: #09090b;
            --bg-card: #18181b;
            --border: #27272a;
            --text-main: #f4f4f5;
            --text-muted: #71717a;
            --accent-blue: #3b82f6;
            --accent-yellow: #f1c40f;
            --danger: #ef4444;
            --green: #4ade80;
        }

        * { box-sizing: border-box !important; margin: 0; padding: 0; }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        /* 1. SUPER TRAVA (TELA DE LOGIN) */
        #bloqueio-login {
            width: 100%; max-width: 400px; padding: 40px;
            background: var(--bg-card); border-radius: 15px;
            border: 1px solid var(--border); text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .login-header { margin-bottom: 30px; }
        .login-header div { font-size: 12px; color: var(--accent-yellow); letter-spacing: 3px; font-weight: bold; }
        .login-header h2 { font-size: 22px; margin-top: 5px; text-transform: uppercase; }

        input {
            width: 100%; padding: 15px; margin-bottom: 15px;
            background: var(--bg-body); border: 1px solid var(--border);
            border-radius: 8px; color: white; font-size: 16px; outline: none;
        }
        input:focus { border-color: var(--accent-blue); }

        .btn-entrar {
            width: 100%; padding: 15px; background: var(--accent-blue);
            color: white; border: none; border-radius: 8px;
            font-weight: bold; cursor: pointer; text-transform: uppercase;
        }

        /* 2. HUB DE ACESSO (PÓS-LOGIN) */
        #hub-acesso { display: none; text-align: center; }
        .hub-grid { display: flex; gap: 20px; margin-top: 30px; }
        
        .btn-hub {
            background: var(--bg-card); border: 1px solid var(--border);
            padding: 40px; border-radius: 15px; cursor: pointer;
            transition: 0.3s; width: 220px; text-decoration: none; color: white;
        }
        .btn-hub:hover { border-color: var(--accent-blue); transform: translateY(-5px); background: #1e293b; }
        .btn-hub svg { width: 40px; height: 40px; margin-bottom: 15px; color: var(--accent-blue); }

        /* 3. DASHBOARD REAL (O CONTEÚDO) */
        #conteudo-dashboard { display: none; width: 100%; height: 100vh; flex-direction: column; }
        
        header {
            background: var(--bg-card); padding: 15px 30px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .nav-buttons { display: flex; gap: 15px; }
        .btn-nav { padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; border: none; text-transform: uppercase; }
        .btn-gestao { background: var(--accent-blue); color: white; }
        .btn-sair { background: var(--danger); color: white; }

        main { padding: 30px; flex-grow: 1; overflow-y: auto; }

        /* ESTILO DOS CARDS DO DASHBOARD */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--bg-card); padding: 25px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; }
        .stat-value { font-size: 32px; font-weight: 800; }

        .caixa-tabela { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 12px; color: var(--text-muted); border-bottom: 1px solid var(--border); text-transform: uppercase; font-size: 10px; }
        td { padding: 12px; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="bloqueio-login">
        <div class="login-header">
            <div>SEGURANÇA D2P</div>
            <h2>ACESSO MASTER</h2>
        </div>
        <input type="text" id="master-user" placeholder="Usuário Admin">
        <input type="password" id="master-pass" placeholder="Senha Master">
        <button class="btn-entrar" onclick="tentarAcesso()">Desbloquear Sistema</button>
        <div id="msg-erro" style="color:var(--danger); font-size:12px; margin-top:15px; display:none">Acesso Negado!</div>
    </div>

    <div id="hub-acesso">
        <h1 style="font-size: 24px; margin-bottom: 10px;">Bem-vindo, <span id="nome-admin-hub">Admin</span></h1>
        <p style="color: var(--text-muted);">O que deseja gerenciar agora?</p>
        <div class="hub-grid">
            <div class="btn-hub" onclick="abrirDashboard()">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                <h3>DASHBOARD</h3>
            </div>
            <div class="btn-hub" onclick="window.location.href='gestao.html'">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                <h3>GESTÃO USUÁRIOS</h3>
            </div>
        </div>
        <button class="btn-sair" style="margin-top: 30px; width: 100px; padding: 10px; border-radius: 8px; border:none; cursor:pointer;" onclick="logout()">SAIR</button>
    </div>

    <div id="conteudo-dashboard">
        <header>
            <div style="font-weight: 800; letter-spacing: 1px;">D2P MASTER <span style="color:var(--text-muted); font-weight: 400;">| Dashboard</span></div>
            <div class="nav-buttons">
                <button class="btn-nav btn-gestao" onclick="window.location.href='gestao.html'">Gestão Usuários</button>
                <button class="btn-nav btn-sair" onclick="logout()">Sair</button>
            </div>
        </header>
        <main>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Acessos hoje</div>
                    <div class="stat-value" id="count-hoje">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Entradas Ativas</div>
                    <div class="stat-value" id="count-entradas">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Portaria</div>
                    <div class="stat-value">P04</div>
                </div>
            </div>
            <div class="caixa-tabela">
                <h3 style="margin-bottom: 15px; font-size: 14px;">Últimos Movimentos</h3>
                <table>
                    <thead><tr><th>Hora</th><th>Nome</th><th>Empresa</th><th>Tipo</th></tr></thead>
                    <tbody id="tabela-dash"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="../conexao/config.js"></script>
    <script src="../conexao/db.js"></script>
    <script>
        // --- A SUPER TRAVA (LÓGICA) ---
        
        // Se der F5, o JavaScript reinicia. Não salvamos permanentemente no localStorage.
        // Usamos sessionStorage: se fechar a aba ou atualizar, a "eclusa" fecha.
        let logado = false;

        async function tentarAcesso() {
            const user = document.getElementById('master-user').value;
            const pass = document.getElementById('master-pass').value;
            const erro = document.getElementById('msg-erro');

            // Busca no Supabase
            const data = await dbBuscar('usuarios', { login: user, senha: pass, nivel_acesso: 'administrador' });

            if (data && data.length > 0) {
                logado = true;
                sessionStorage.setItem('sessao_master', 'ativa');
                sessionStorage.setItem('nome_master', data[0].nome_completo);
                mostrarHub();
            } else {
                erro.style.display = 'block';
            }
        }

        function mostrarHub() {
            document.getElementById('bloqueio-login').style.display = 'none';
            document.getElementById('conteudo-dashboard').style.display = 'none';
            document.getElementById('hub-acesso').style.display = 'block';
            document.getElementById('nome-admin-hub').innerText = sessionStorage.getItem('nome_master');
            // Removemos o alinhamento de centro do body para o dashboard aparecer certo
            document.body.style.alignItems = 'center';
        }

        function abrirDashboard() {
            document.getElementById('hub-acesso').style.display = 'none';
            document.getElementById('conteudo-dashboard').style.display = 'flex';
            document.body.style.alignItems = 'flex-start';
            carregarDadosDash();
        }

        function logout() {
            sessionStorage.clear();
            location.reload();
        }

        // --- CARREGAMENTO DE DADOS ---

        async function carregarDadosDash() {
            const dataHoje = new Date().toISOString().slice(0, 10);
            const acessos = await dbBuscar('acessos', { data: dataHoje }, { order: 'id.desc' });
            
            if(!acessos) return;

            document.getElementById('count-hoje').innerText = acessos.length;
            document.getElementById('count-entradas').innerText = acessos.filter(a => a.acesso === 'ENTRADA').length;

            const tbody = document.getElementById('tabela-dash');
            tbody.innerHTML = acessos.slice(0, 10).map(a => `
                <tr>
                    <td>${a.hora}</td>
                    <td><b>${a.nome}</b></td>
                    <td>${a.empresa}</td>
                    <td><span style="color:${a.acesso === 'ENTRADA' ? '#4ade80' : '#f87171'}">${a.acesso}</span></td>
                </tr>
            `).join('');
        }

        // Se atualizar a página, volta pro login (conforme você pediu)
        window.onload = () => {
            if (!sessionStorage.getItem('sessao_master')) {
                logout();
            } else {
                mostrarHub();
            }
        };
    </script>
</body>
</html>
