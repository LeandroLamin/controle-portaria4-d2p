<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Usuários - Master D2P</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; display: flex; min-height: 100vh; font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; }

        /* SIDEBAR - Travada e Alinhada */
        .sidebar {
            width: 260px; background-color: #2c3e50; color: white; display: flex; flex-direction: column;
            padding: 20px; position: fixed; left: 0; top: 0; bottom: 0; z-index: 1000;
        }
        .sidebar-header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid #34495e; padding-bottom: 20px; }
        
        .menu-item {
            display: flex; align-items: center; gap: 12px; padding: 15px; color: #bdc3c7;
            text-decoration: none; border-radius: 8px; margin-bottom: 8px; transition: 0.3s; cursor: pointer;
        }
        .menu-item:hover, .menu-item.active { background-color: #34495e; color: white; border-left: 4px solid #f1c40f; }

        /* ÁREA DE CONTEÚDO - Organizada */
        .main-content {
            margin-left: 260px; flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center;
        }
        .container-centralizado { width: 100%; max-width: 1000px; }

        .page-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px; border-bottom: 2px solid #ddd; padding-bottom: 15px;
        }

        /* TABELA PROFISSIONAL */
        .table-card {
            background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%;
        }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; color: #7f8c8d; font-size: 11px; text-transform: uppercase; padding: 15px; text-align: left; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 14px; color: #333; }
        
        /* O "X" VERMELHO QUE VOCÊ SUGERIU */
        .btn-x {
            background-color: #ff4757; color: white; border: none; width: 30px; height: 30px;
            border-radius: 50%; cursor: pointer; font-weight: bold; font-size: 14px;
            display: flex; align-items: center; justify-content: center; transition: 0.3s; margin: 0 auto;
        }
        .btn-x:hover { background-color: #ff6b81; transform: scale(1.1); box-shadow: 0 4px 8px rgba(255, 71, 87, 0.3); }

        /* BADGES COLORIDOS */
        .badge { font-size: 10px; font-weight: bold; text-transform: uppercase; padding: 5px 12px; border-radius: 15px; color: white; display: inline-block; }
        .bg-admin { background-color: #27ae60; box-shadow: 0 2px 6px rgba(39, 174, 96, 0.2); }
        .bg-p04 { background-color: #3498db; }

        .btn-logout { background: #34495e; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: auto; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">
            <div style="font-size: 10px; letter-spacing: 2px; color: #95a5a6;">SEGURANÇA D2P</div>
            <h2 style="color: white; font-size: 18px; margin: 5px 0 0 0;">PAINEL MASTER</h2>
        </div>
        <div class="sidebar-menu" style="flex-grow:1">
            <a href="index.html" class="menu-item">➕ Novo Cadastro</a>
            <a href="#" class="menu-item active">👥 Gestão de Usuários</a>
        </div>
        <button class="btn-logout" onclick="location.href='../index.html'">SAIR</button>
    </nav>

    <main class="main-content">
        <div class="container-centralizado">
            <div class="page-header">
                <h1 style="margin:0; color:#2c3e50; font-size: 24px;">Controle de Operadores</h1>
                <div style="font-size: 13px;">Admin: <b>LEANDRO LAMIN</b></div>
            </div>

            <div class="table-card">
                <table id="tabela-usuarios">
                    <thead>
                        <tr>
                            <th style="width: 50px;">ID</th>
                            <th>LOGIN</th>
                            <th>NOME COMPLETO</th>
                            <th>NÍVEL</th>
                            <th style="text-align: center;">REMOVER</th>
                        </tr>
                    </thead>
                    <tbody id="corpo-tabela-usuarios">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/gestao_admin.js"></script>
</body>
</html>
