<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel MASTER - Gestão de Usuários - D2P</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* Estilos específicos para o layout em duas colunas (Sidebar fixa) */
        body { margin: 0; padding: 0; display: flex; min-height: 100vh; font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; }
        
        .sidebar {
            width: 260px;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            position: fixed;
            height: 100vh;
        }

        .sidebar-header { text-align: center; margin-bottom: 40px; border-bottom: 1px solid #34495e; padding-bottom: 20px; }
        .safeguard-title { font-size: 20px; margin: 5px 0 0 0; color: white; }

        .sidebar-menu { flex-grow: 1; }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            color: #bdc3c7;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: background 0.2s;
            cursor: pointer;
        }

        .menu-item:hover, .menu-item.active {
            background-color: #34495e;
            color: white;
            border-left: 4px solid #f1c40f;
        }

        .main-content {
            margin-left: 260px;
            flex-grow: 1;
            padding: 40px;
            width: calc(100% - 260px);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #ddd;
            padding-bottom: 15px;
        }

        .page-title { margin: 0; color: #2c3e50; font-size: 28px; }

        /* Estilo da Tabela */
        .table-container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        table th, table td { text-align: left; padding: 15px; border-bottom: 1px solid #eee; }
        table th { background-color: #f8f9fa; color: #7f8c8d; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        table tr:hover { background-color: #f1f4f6; }

        /* Badges de Cores (Verde para Admin) */
        .badge { font-size: 10px; font-weight: bold; text-transform: uppercase; padding: 5px 10px; border-radius: 20px; color: white; }
        .badge-admin { background-color: #27ae60; } /* Verde Sucesso */
        .badge-portaria { background-color: #3498db; } /* Azul Portaria */

        /* Botão Lixeira */
        .btn-delete {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            padding: 8px;
            border-radius: 5px;
            transition: 0.2s;
        }

        .btn-delete:hover { background-color: #fadbd8; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">
            <h2 class="safeguard-title">Painel MASTER</h2>
        </div>
        <div class="sidebar-menu">
            <a href="index.html" class="menu-item">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/></svg>
                Novo Cadastro
            </a>
            <a href="#" class="menu-item active">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M14.5 3a.5.5 0 0 1 .5.5v9a.5.5 0 0 1-.5.5h-13a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h13zm-13-1A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h13a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 14.5 2h-13z"/><path d="M7 5.5a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5zm0 2.5a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5zm0 2.5a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5zM2.5 5a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 0 1h-2a.5.5 0 0 1-.5-.5zm0 2.5a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 0 1h-2a.5.5 0 0 1-.5-.5zm0 2.5a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 0 1h-2a.5.5 0 0 1-.5-.5z"/></svg>
                Gestão de Usuários
            </a>
        </div>
        <div class="sidebar-footer">
            <button class="btn-limpar" style="width: 100%;" onclick="location.href='../index.html'">SAIR</button>
        </div>
    </nav>

    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">Usuários Cadastrados</h1>
            <div>Logado como: <b>LEANDRO LAMIN</b></div>
        </div>

        <div class="table-container">
            <h3>Lista Completa</h3>
            <p style="font-size: 14px; color: #7f8c8d; margin-bottom: 20px;">Use o ícone de lixeira (🗑️) para excluir um acesso permanentemente.</p>
            
            <table id="tabela-usuarios">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Login</th>
                        <th>Nome Completo</th>
                        <th>Nível de Acesso</th>
                        <th style="text-align: center;">Ações</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela-usuarios">
                    </tbody>
            </table>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/gestao_admin.js"></script>

</body>
</html>
