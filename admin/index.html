<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel MASTER - Novo Cadastro - D2P</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* TRAVA GERAL DE LAYOUT */
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #f4f7f6; 
            display: flex; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }

        /* TELA DE LOGIN MASTER (OVERLAY) */
        #wrapper-login {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #f4f7f6; display: flex; justify-content: center; align-items: center; z-index: 9999;
        }

        /* BARRA LATERAL (TRAVADA NA ESQUERDA) */
        .sidebar {
            width: 260px; height: 100vh; position: fixed; left: 0; top: 0;
            background-color: #2c3e50; color: white; display: flex; flex-direction: column; padding: 20px;
        }
        .sidebar-header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid #34495e; padding-bottom: 20px; }
        .menu-item {
            display: flex; align-items: center; gap: 12px; padding: 15px; color: #bdc3c7;
            text-decoration: none; border-radius: 8px; margin-bottom: 10px; transition: 0.3s; cursor: pointer;
        }
        .menu-item:hover, .menu-item.active { background-color: #34495e; color: white; border-left: 4px solid #f1c40f; }
        .btn-sair { background: #34495e; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; margin-top: auto; width: 100%; }

        /* CONTEÚDO PRINCIPAL (EMPURRADO PARA A DIREITA E CENTRALIZADO) */
        .main-content {
            margin-left: 260px; 
            width: calc(100% - 260px); 
            padding: 40px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        /* CAIXA BRANCA DO FORMULÁRIO LIMITADA */
        .caixa-branca {
            background: white; 
            width: 100%; 
            max-width: 700px; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; width: 100%; max-width: 700px; }
        
        /* CAMPOS DO FORMULÁRIO */
        .campo { margin-bottom: 15px; width: 100%; }
        .campo label { display: block; font-size: 13px; font-weight: bold; color: #34495e; margin-bottom: 5px; }
        .campo input, .campo select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; }
    </style>
</head>
<body>

    <div id="wrapper-login">
        <div class="container-corporativo" style="max-width: 350px;">
            <div style="text-align: center; margin-bottom: 20px;">
                <h2 style="color: #2c3e50; margin: 0;">ACESSO MASTER</h2>
                <small>Autenticação Obrigatória</small>
            </div>
            <input type="text" id="user-admin" placeholder="Usuário Admin">
            <input type="password" id="pass-admin" placeholder="Senha">
            <button class="btn-salvar" style="width: 100%;" onclick="autenticarAdmin()">ENTRAR</button>
            <button class="btn-limpar" style="width: 100%; margin-top: 10px;" onclick="location.href='../index.html'">VOLTAR</button>
        </div>
    </div>

    <nav class="sidebar">
        <div class="sidebar-header">
            <div style="font-size: 10px; color: #95a5a6; letter-spacing: 2px;">SEGURANÇA D2P</div>
            <h2 style="color: white; font-size: 18px; margin-top: 5px;">PAINEL MASTER</h2>
        </div>
        <div style="flex-grow: 1;">
            <a href="#" class="menu-item active">➕ Novo Cadastro</a>
            <a href="gestao.html" class="menu-item">👥 Gestão de Usuários</a> 
        </div>
        <button class="btn-sair" onclick="location.href='../index.html'">SAIR DO SISTEMA</button>
    </nav>

    <main class="main-content">
        
        <div class="page-header">
            <h1 style="margin:0; color:#2c3e50; font-size: 24px;">CADASTRO DE OPERADORES</h1>
            <div style="font-size: 13px;">Admin: <b id="nome-admin-logado">---</b></div>
        </div>

        <div class="caixa-branca">
            <h3 style="margin-top:0; color: #34495e; border-bottom: 1px solid #eee; padding-bottom: 10px;">Dados do Novo Vigilante</h3>
            
            <div class="campo">
                <label>NOME COMPLETO:</label>
                <input type="text" id="cad-nome" placeholder="Ex: JOÃO DA SILVA">
            </div>
            <div class="campo">
                <label>LOGIN (ÚNICO):</label>
                <input type="text" id="cad-login" placeholder="Ex: joao.p04">
            </div>
            <div class="campo">
                <label>SENHA DE ACESSO:</label>
                <input type="password" id="cad-senha" placeholder="SENHA">
            </div>
            <div class="campo">
                <label>NÍVEL DE PERMISSÃO / UNIDADE:</label>
                <select id="cad-nivel">
                    <option value="p01">Portaria 01</option>
                    <option value="p02">Portaria 02</option>
                    <option value="p03">Portaria 03</option>
                    <option value="p04" selected>Portaria 04</option>
                    <option value="administrador">Administrador (Master)</option>
                </select>
            </div>
            
            <button class="btn-salvar" style="width: 100%; height: 50px; margin-top: 15px;" onclick="cadastrarUsuario()">FINALIZAR CADASTRO</button>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script>
        async function autenticarAdmin() {
            const user = document.getElementById('user-admin').value.trim();
            const pass = document.getElementById('pass-admin').value.trim();
            
            const { data, error } = await _supabase.from('usuarios').select('*').eq('login', user).eq('senha', pass).single();

            if (data && data.nivel_acesso === 'administrador') {
                document.getElementById('wrapper-login').style.display = 'none';
                document.getElementById('nome-admin-logado').innerText = data.nome_completo;
            } else {
                alert("Acesso Negado: Usuário não é Administrador ou senha incorreta.");
            }
        }

        async function cadastrarUsuario() {
            const nome = document.getElementById('cad-nome').value.toUpperCase();
            const login = document.getElementById('cad-login').value.trim();
            const senha = document.getElementById('cad-senha').value.trim();
            const nivel = document.getElementById('cad-nivel').value;
            
            if(!nome || !login || !senha) return alert("Atenção: Preencha todos os campos!");

            const { error } = await _supabase.from('usuarios').insert([{ nome_completo: nome, login: login, senha: senha, nivel_acesso: nivel }]);
            
            if(error) alert("Erro ao cadastrar: " + error.message);
            else { 
                alert("Usuário " + nome + " cadastrado com sucesso!"); 
                location.reload(); 
            }
        }
    </script>
</body>
</html>
