<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Master - Segurança D2P</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body style="background-color: #f4f7f6;">

    <div id="tela-login-admin" style="display: block; margin-top: 100px;">
        <div class="container-corporativo" style="max-width: 400px; margin: auto;">
            <div style="text-align: center; margin-bottom: 20px;">
                <div style="font-size: 10px; font-weight: bold; color: #7f8c8d; letter-spacing: 2px;">ACESSO RESTRITO</div>
                <h2 style="color: #2c3e50;">PAINEL MASTER</h2>
            </div>
            <input type="text" id="user-admin" placeholder="Usuário Admin">
            <input type="password" id="pass-admin" placeholder="Senha">
            <button class="btn-salvar" style="width: 100%;" onclick="autenticarAdmin()">ACESSAR GESTÃO</button>
            <button class="btn-limpar" style="width: 100%; margin-top: 10px;" onclick="location.href='../index.html'">VOLTAR</button>
        </div>
    </div>

    <div id="conteudo-admin" style="display: none;">
        <div class="container-corporativo" style="margin-top: 50px; max-width: 600px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
            <div style="text-align: center; margin-bottom: 20px;">
                <div style="font-size: 12px; font-weight: bold; color: #34495e; letter-spacing: 2px;">SISTEMA D2P</div>
                <h1 style="margin-top: 5px; color: #2c3e50;">CADASTRO DE OPERADORES</h1>
            </div>

            <div class="grid" style="grid-template-columns: 1fr; gap: 15px;">
                <div class="campo"><label>Nome do Vigilante:</label><input type="text" id="cad-nome" placeholder="NOME COMPLETO"></div>
                <div class="campo"><label>Login de Acesso:</label><input type="text" id="cad-login" placeholder="Ex: joao.p04"></div>
                <div class="campo"><label>Senha de Acesso:</label><input type="password" id="cad-senha" placeholder="SENHA"></div>
                <div class="campo">
                    <label>Nível de Permissão:</label>
                    <select id="cad-nivel" style="width: 100%; padding: 10px; border-radius: 5px;">
                        <option value="p01">PORTARIA 01</option>
                        <option value="p02">PORTARIA 02</option>
                        <option value="p03">PORTARIA 03</option>
                        <option value="p04">PORTARIA 04</option>
                        <option value="administrador">ADMINISTRADOR (ACESSO TOTAL)</option>
                    </select>
                </div>
            </div>

            <div class="botoes" style="margin-top: 30px; display: flex; flex-direction: column; gap: 10px;">
                <button class="btn-salvar" style="height: 50px;" onclick="cadastrarUsuario()">CADASTRAR NOVO ACESSO</button>
                <button class="btn-limpar" onclick="location.href='../index.html'">SAIR DO PAINEL</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script>
        // 1. Função para validar se quem está tentando entrar é ADMIN
        async function autenticarAdmin() {
            const user = document.getElementById('user-admin').value.trim();
            const pass = document.getElementById('pass-admin').value.trim();

            const { data, error } = await _supabase
                .from('usuarios')
                .select('*')
                .eq('login', user)
                .eq('senha', pass)
                .single();

            if (data && data.nivel_acesso === 'administrador') {
                document.getElementById('tela-login-admin').style.display = 'none';
                document.getElementById('conteudo-admin').style.display = 'block';
            } else {
                alert("ACESSO NEGADO: Apenas administradores podem acessar esta tela.");
            }
        }

        // 2. Função de Cadastro (Usando a tabela 'usuarios' sem acento)
        async function cadastrarUsuario() {
            const nome = document.getElementById('cad-nome').value.toUpperCase();
            const login = document.getElementById('cad-login').value.trim();
            const senha = document.getElementById('cad-senha').value.trim();
            const nivel = document.getElementById('cad-nivel').value;

            if(!nome || !login || !senha) return alert("Preencha todos os campos.");

            const { error } = await _supabase.from('usuarios').insert([
                { nome_completo: nome, login: login, senha: senha, nivel_acesso: nivel }
            ]);

            if(error) {
                alert("Erro: " + error.message);
            } else {
                alert("Sucesso! Operador " + nome + " cadastrado.");
                document.getElementById('cad-nome').value = '';
                document.getElementById('cad-login').value = '';
                document.getElementById('cad-senha').value = '';
            }
        }
    </script>
</body>
</html>
