<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel MASTER - Novo Cadastro - D2P</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        :root {
            --primary-dark: #1a252f;
            --secondary-dark: #2c3e50;
            --accent-gold: #f1c40f;
            --accent-hover: #f39c12;
            --bg-light: #f4f7f6;
            --sidebar-item: #34495e;
            --text-muted: #bdc3c7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-light); 
            display: flex; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }

        /* --- LOGIN OVERLAY (ESTILO COMPACTO) --- */
        #wrapper-login {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--secondary-dark) 50%, var(--primary-dark) 100%);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
        .login-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 30px 35px; /* Espaçamento interno reduzido */
            width: 90%;
            max-width: 360px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            text-align: center;
        }
        .login-logo { margin-bottom: 20px; } /* Espaço reduzido abaixo do logo */
        .login-logo .titulo { 
            color: var(--accent-gold); 
            font-size: 10px; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            margin-bottom: 5px; 
        }
        .login-logo h2 { color: white; font-size: 20px; margin: 0; font-weight: 700; letter-spacing: 1px; }
        .login-logo small { 
            color: rgba(255,255,255,0.4); 
            font-size: 11px; 
            display: block; 
            margin-top: 10px; /* Reduzido o espaço da legenda */
        }
        
        /* Removido .login-divider conforme solicitado */

        .login-campo { margin-bottom: 12px; } /* Espaço entre campos reduzido */
        .login-campo input {
            width: 100%; padding: 12px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px; color: white; font-size: 14px;
            outline: none; transition: border 0.2s;
        }
        .login-campo input::placeholder { color: rgba(255,255,255,0.3); }
        .login-campo input:focus { border-color: var(--accent-gold); }

        .btn-entrar {
            width: 100%; padding: 13px; background: var(--accent-gold); color: var(--primary-dark);
            border: none; border-radius: 8px; font-size: 14px; font-weight: 700;
            letter-spacing: 2px; cursor: pointer; margin-top: 5px; transition: all 0.2s;
        }
        .btn-entrar:hover { background: var(--accent-hover); transform: translateY(-1px); }
        
        .btn-voltar {
            width: 100%; padding: 10px; background: transparent;
            color: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; font-size: 13px; cursor: pointer; margin-top: 8px;
            transition: all 0.2s;
        }
        .btn-voltar:hover { color: white; border-color: rgba(255,255,255,0.3); }

        /* --- SIDEBAR --- */
        .sidebar { 
            width: 260px; height: 100vh; position: fixed; left: 0; top: 0; 
            background-color: var(--secondary-dark); color: white; 
            display: flex; flex-direction: column; padding: 20px; 
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
        }
        .sidebar-header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid var(--sidebar-item); padding-bottom: 20px; }
        
        .menu-item { 
            display: flex; align-items: center; gap: 12px; padding: 15px; 
            color: var(--text-muted); text-decoration: none; border-radius: 8px; 
            margin-bottom: 10px; transition: 0.3s; 
        }
        .menu-item:hover, .menu-item.active { background-color: var(--sidebar-item); color: white; border-left: 4px solid var(--accent-gold); }
        
        .btn-sair { 
            background: var(--sidebar-item); color: white; border: none; padding: 12px; 
            border-radius: 8px; cursor: pointer; margin-top: auto; width: 100%; 
        }

        /* --- CONTEÚDO --- */
        .main-content { margin-left: 260px; width: calc(100% - 260px); padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; width: 100%; max-width: 700px; }
        .caixa-branca { background: white; width: 100%; max-width: 700px; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .campo { margin-bottom: 18px; width: 100%; }
        .campo label { display: block; font-size: 13px; font-weight: bold; color: var(--secondary-dark); margin-bottom: 6px; }
        .campo input, .campo select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }

        .btn-salvar {
            width: 100%; height: 50px; margin-top: 15px;
            background: var(--accent-gold); color: var(--primary-dark);
            border: none; border-radius: 8px; font-size: 15px; font-weight: 700;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-salvar:hover { background: var(--accent-hover); transform: translateY(-2px); }
    </style>
</head>
<body>

    <!-- OVERLAY DE LOGIN -->
    <div id="wrapper-login">
        <div class="login-card">
            <div class="login-logo">
                <div class="titulo">Segurança D2P</div>
                <h2>ACESSO MASTER</h2>
                <small>Autenticação Obrigatória</small>
            </div>
            <div class="login-campo">
                <input type="text" id="user-admin" placeholder="Usuário Admin" autocomplete="off">
            </div>
            <div class="login-campo">
                <input type="password" id="pass-admin" placeholder="Senha">
            </div>
            <button class="btn-entrar" onclick="autenticarAdmin()">ENTRAR</button>
            <button class="btn-voltar" onclick="location.href='../index.html'">VOLTAR</button>
        </div>
    </div>

    <!-- SIDEBAR -->
    <nav class="sidebar">
        <div class="sidebar-header">
            <div style="font-size: 10px; color: var(--text-muted); letter-spacing: 2px;">SEGURANÇA D2P</div>
            <h2 style="color: white; font-size: 18px; margin-top: 5px;">PAINEL MASTER</h2>
        </div>
        <div style="flex-grow: 1;">
            <a href="#" class="menu-item active">➕ Novo Cadastro</a>
            <a href="gestao.html" class="menu-item">👥 Gestão de Usuários</a>
            <a href="dashboard.html" class="menu-item">📊 Dashboard de Acessos</a>
        </div>
        <button class="btn-sair" onclick="location.href='../index.html'">SAIR DO SISTEMA</button>
    </nav>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="main-content">
        <div class="page-header">
            <h1 style="margin:0; color:var(--secondary-dark); font-size: 24px;">CADASTRO DE OPERADORES</h1>
            <div style="font-size: 13px;">Admin: <b id="nome-admin-logado">---</b></div>
        </div>

        <div class="caixa-branca">
            <h3 style="margin-top:0; color: var(--secondary-dark); border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 20px;">
                Dados do Novo Vigilante
            </h3>
            <div class="campo">
                <label>NOME COMPLETO:</label>
                <input type="text" id="cad-nome" placeholder="Ex: JOAO DA SILVA">
            </div>
            <div class="campo">
                <label>LOGIN (ÚNICO):</label>
                <input type="text" id="cad-login" placeholder="Ex: joao.p04">
            </div>
            <div class="campo">
                <label>SENHA DE ACESSO:</label>
                <input type="password" id="cad-senha" placeholder="SENHA">
            </div>
            <div class="campo">
                <label>NÍVEL DE PERMISSÃO / UNIDADE:</label>
                <select id="cad-nivel">
                    <option value="p01">Portaria 01</option>
                    <option value="p02">Portaria 02</option>
                    <option value="p03">Portaria 03</option>
                    <option value="p04" selected>Portaria 04</option>
                    <option value="administrador">Administrador (Master)</option>
                </select>
            </div>
            <button class="btn-salvar" onclick="cadastrarUsuario()">FINALIZAR CADASTRO</button>
        </div>
    </main>

    <script src="../conexao/config.js"></script>
    <script src="../conexao/db.js"></script>
    <script>
        async function autenticarAdmin() {
            const user = document.getElementById('user-admin').value.trim();
            const pass = document.getElementById('pass-admin').value.trim();
            if(!user || !pass) return;

            const data = await dbBuscar('usuarios', { login: user, senha: pass });

            if (data && data.length > 0 && data[0].nivel_acesso === 'administrador') {
                document.getElementById('wrapper-login').style.display = 'none';
                document.getElementById('nome-admin-logado').innerText = data[0].nome_completo;
            } else {
                alert("Acesso Negado: Usuário não é Administrador ou senha incorreta.");
            }
        }

        async function cadastrarUsuario() {
            const nome = document.getElementById('cad-nome').value.trim().toUpperCase();
            const login = document.getElementById('cad-login').value.trim();
            const senha = document.getElementById('cad-senha').value.trim();
            const nivel = document.getElementById('cad-nivel').value;

            if (!nome || !login || !senha) return alert("Atenção: Preencha todos os campos!");

            const result = await dbSalvar('usuarios', { 
                nome_completo: nome, 
                login: login, 
                senha: senha, 
                nivel_acesso: nivel 
            });

            if (result && result.ok) {
                alert("Usuário " + nome + " cadastrado com sucesso!");
                location.reload();
            } else {
                alert("Erro ao cadastrar usuário.");
            }
        }
    </script>
</body>
</html>
