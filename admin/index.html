<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel MASTER - Novo Cadastro - D2P</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* RESET E ESTRUTURA BASE */
        * { box-sizing: border-box; }
        
        body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            min-height: 100vh; 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #f4f7f6; 
        }

        /* BARRA LATERAL FIXA - Agora travada na esquerda */
        .sidebar {
            width: 260px;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.2);
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: 1000; /* Garante que ela fique por cima */
        }

        .sidebar-header { 
            text-align: center; 
            margin-bottom: 30px; 
            border-bottom: 1px solid #34495e; 
            padding-bottom: 20px; 
        }

        .sidebar-menu { flex-grow: 1; }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            color: #bdc3c7;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .menu-item:hover, .menu-item.active {
            background-color: #34495e;
            color: white;
            border-left: 4px solid #f1c40f;
        }

        /* CONTEÚDO PRINCIPAL - AGORA CORRIGIDO */
        .main-content {
            margin-left: 260px; /* ISSO AQUI EMPURRA O FUNDO PARA A DIREITA */
            flex: 1;
            padding: 40px;
            width: calc(100% - 260px);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #ddd;
            padding-bottom: 15px;
        }

        .form-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 800px;
        }

        .btn-logout {
            background-color: #34495e;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-logout:hover { background-color: #e74c3c; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">
            <div style="font-size: 10px; letter-spacing: 2px; color: #95a5a6;">SISTEMA D2P</div>
            <h2 style="color: white; font-size: 18px; margin: 5px 0 0 0;">PAINEL MASTER</h2>
        </div>
        
        <div class="sidebar-menu">
            <a href="#" class="menu-item active">
                <svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/></svg>
                Novo Cadastro
            </a>
            <a href="gestao.html" class="menu-item">
                <svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M14.5 3a.5.5 0 0 1 .5.5v9a.5.5 0 0 1-.5.5h-13a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h13zm-13-1A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h13a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 14.5 2h-13z"/><path d="M7 5.5a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5zm0 2.5a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5zm0 2.5a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5z"/></svg>
                Gestão de Usuários
            </a>
        </div>

        <button class="btn-logout" onclick="location.href='../index.html'">SAIR</button>
    </nav>

    <main class="main-content">
        <div class="page-header">
            <h1 style="margin:0; color:#2c3e50; font-size: 24px;">CADASTRO DE OPERADORES</h1>
            <div style="font-size: 13px;">Logado como: <b>LEANDRO LAMIN</b></div>
        </div>

        <div class="form-container">
            <h3 style="color: #34495e; margin-top: 0; font-size: 16px;">Novo Cadastro de Vigilante</h3>
            <div class="grid" style="grid-template-columns: 1fr; gap: 15px; margin-top: 20px;">
                <div class="campo"><label>NOME COMPLETO:</label><input type="text" id="cad-nome" placeholder="NOME DO COLABORADOR"></div>
                <div class="campo"><label>LOGIN (ÚNICO):</label><input type="text" id="cad-login" placeholder="Ex: joao.p04"></div>
                <div class="campo"><label>SENHA INICIAL:</label><input type="password" id="cad-senha" placeholder="SENHA"></div>
                <div class="campo">
                    <label>NÍVEL DE PERMISSÃO:</label>
                    <select id="cad-nivel" style="width: 100%; padding: 10px; border-radius: 5px;">
                        <option value="p01">Portaria 01</option>
                        <option value="p02">Portaria 02</option>
                        <option value="p03">Portaria 03</option>
                        <option value="p04" selected>Portaria 04</option>
                        <option value="administrador">Administrador (Master)</option>
                    </select>
                </div>
            </div>

            <div style="margin-top: 30px;">
                <button class="btn-salvar" style="width: 100%; height: 50px;" onclick="cadastrarUsuario()">FINALIZAR CADASTRO</button>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script>
        async function cadastrarUsuario() {
            const nome = document.getElementById('cad-nome').value.toUpperCase();
            const login = document.getElementById('cad-login').value.trim();
            const senha = document.getElementById('cad-senha').value.trim();
            const nivel = document.getElementById('cad-nivel').value;

            if(!nome || !login || !senha) return alert("Preencha todos os campos.");

            const { error } = await _supabase.from('usuarios').insert([
                { nome_completo: nome, login: login, senha: senha, nivel_acesso: nivel }
            ]);

            if(error) {
                alert("Erro ao gravar: " + error.message);
            } else {
                alert("Sucesso! Operador " + nome + " cadastrado.");
                document.getElementById('cad-nome').value = '';
                document.getElementById('cad-login').value = '';
                document.getElementById('cad-senha').value = '';
            }
        }
    </script>
</body>
</html>
