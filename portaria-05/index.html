<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portaria 05 - CVU</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div class="topbar">
        <div class="topbar-titulo">CONTROLE DE ACESSO — PORTARIA 05 CVU</div>
        <div class="topbar-user">
            Usuário: <span id="nome-logado"></span>
            <a href="#" onclick="sessionStorage.clear(); location.href='/menu/index.html';">SAIR</a>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div class="form-row">
                <div class="form-group">
                    <label>CPF (Apenas números)</label>
                    <input type="text" id="p05-cpf" placeholder="000.000.000-00">
                </div>
                <div class="form-group btn-align">
                    <button class="btn-buscar" onclick="localizar()">BUSCAR CADASTRO</button>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" id="p05-nome">
                </div>
                <div class="form-group">
                    <label>Empresa</label>
                    <input type="text" id="p05-empresa">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Responsável / Destino</label>
                    <input type="text" id="p05-responsavel">
                </div>
                <div class="form-group">
                    <label>Motivo do Acesso</label>
                    <select id="p05-motivo">
                        <option value="">Selecione...</option>
                        <option value="PRESTADOR">PRESTADOR</option>
                        <option value="VISITANTE">VISITANTE</option>
                        <option value="ENTREGA">ENTREGA</option>
                        <option value="OUTROS">OUTROS</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Liberado por</label>
                    <select id="p05-liberado">
                        <option value="">Selecione...</option>
                        <option value="MONITORAMENTO">MONITORAMENTO</option>
                        <option value="ADM">ADM</option>
                        <option value="RH">RH</option>
                        <option value="DIRETORIA">DIRETORIA</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Nº Crachá</label>
                    <input type="text" id="p05-num-cracha">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Vigilante de Turno</label>
                    <input type="text" id="p05-vigilante">
                </div>
                <div class="form-group">
                    <label>Tipo de Acesso</label>
                    <select id="p05-acesso" style="font-weight: bold; color: #d32f2f;">
                        <option value="">Selecione...</option>
                        <option value="ENTRADA">ENTRADA</option>
                        <option value="SAÍDA">SAÍDA</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Observações</label>
                <textarea id="p05-obs" rows="2"></textarea>
            </div>

            <div class="form-buttons">
                <button class="btn-salvar" onclick="salvar()">SALVAR ACESSO</button>
                <button class="btn-relatorio" onclick="p05AbrirRelatorio()">RELATÓRIO</button>
            </div>
        </div>
    </div>

    <div id="modal-p05" class="modal">
        <div class="modal-content">
            <span class="close" onclick="p05FecharRelatorio()">&times;</span>
            <h3>Relatório de Acessos - P05</h3>
            
            <div class="filtro-row">
                <input type="date" id="filtro-inicio">
                <input type="date" id="filtro-fim">
                <input type="text" id="filtro-nome" placeholder="Buscar por Nome ou CPF">
                <button onclick="buscarRelatorio()">BUSCAR</button>
                <button class="btn-excel" onclick="exportarExcel()">EXCEL</button>
            </div>

            <div class="tabela-container">
                <table id="tabela-resultados">
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Hora</th>
                            <th>Nome</th>
                            <th>Empresa</th>
                            <th>Motivo</th>
                            <th>Acesso</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../conexao/config.js?v=2"></script>
    <script src="../conexao/db.js?v=2"></script>
    <script src="../js/ui.js?v=2"></script>
    <script src="js/api.js?v=5"></script>
    
    <script>
        document.getElementById('nome-logado').innerText = sessionStorage.getItem('d2p-auth') || 'Usuário';
    </script>
</body>
</html>
