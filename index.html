<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistemas D2P - Seleção de Unidade</title>
    <style>
        :root {
            --cor-primaria: #34495e;
            --cor-destaque: #f1c40f;
            --cor-fundo: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--cor-fundo);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo-texto {
            font-size: 14px;
            font-weight: bold;
            color: var(--cor-primaria);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        h1 { color: var(--cor-primaria); margin-top: 10px; }

        .grid-portarias {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            width: 90%;
            max-width: 800px;
        }

        .card-portaria {
            background: white;
            border-bottom: 5px solid var(--cor-primaria);
            padding: 40px;
            text-align: center;
            text-decoration: none;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-portaria:hover {
            transform: translateY(-10px);
            border-bottom-color: var(--cor-destaque);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .card-portaria h3 { margin: 0; color: var(--cor-primaria); font-size: 24px; }
        .card-portaria p { color: #7f8c8d; margin-top: 10px; font-size: 14px; }

        .status {
            font-size: 10px;
            background: #27ae60;
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            margin-bottom: 15px;
        }

        .status.breve { background: #95a5a6; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-texto">SEGURANÇA PATRIMONIAL D2P-BRAZIL</div>
        <h1>Selecione a Portaria de Trabalho</h1>
    </div>

    <div class="grid-portarias">
        <a href="portaria-01/index.html" class="card-portaria">
            <div class="status breve">EM BREVE</div>
            <h3>PORTARIA 01</h3>
            <p>Acesso Principal</p>
        </a>

        <a href="portaria-02/index.html" class="card-portaria">
            <div class="status breve">EM BREVE</div>
            <h3>PORTARIA 02</h3>
            <p>Expedição</p>
        </a>

        <a href="portaria-03/index.html" class="card-portaria">
            <div class="status breve">EM BREVE</div>
            <h3>PORTARIA 03</h3>
            <p>Funcionários</p>
        </a>

        <a href="portaria-04/index.html" class="card-portaria">
            <div class="status">OPERACIONAL</div>
            <h3>PORTARIA 04</h3>
            <p>Visitantes e Terceiros</p>
        </a>
    </div>

</body>
</html>
