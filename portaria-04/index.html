<!DOCTYPE html>
<html lang="pt-br" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <title>Controle de Acesso - Portaria 04</title>
    <link rel="stylesheet" href="../css/style.css">
<script>
(function() {
    var auth = sessionStorage.getItem('d2p-auth');
    if (!auth) { location.replace('/menu/index.html'); return; }
    var niveis = (sessionStorage.getItem('d2p-nivel') || '').toLowerCase().split(',').map(function(n){ return n.trim(); });
    if (!niveis.includes('p04') && !niveis.includes('portaria-04') && !niveis.includes('administrador')) { location.replace('/portarias.html?negado=Portaria+04'); }
})();
</script>
</head>
<body>

    <div id="sistema-principal" style="display: none;">
        <div class="header-usuario">Usuário: <b id="nome-logado"></b> | <a href="#" onclick="fazerLogout()">Sair</a></div>
        
        <div class="container-corporativo">
            <div style="position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 25px; border-bottom: 2px solid #f1c40f; padding-bottom: 15px; min-height: 70px;">
                <img src="../img/logo_horse.png" alt="Logo Horse" style="position: absolute; left: 0; height: 70px; width: auto;">
                <h1 style="margin: 0; color: #2c3e50; font-size: 24px; text-transform: uppercase;">CONTROLE DE ACESSO - P04</h1>
            </div>

            <div class="grid">
                <div class="campo"><label>CPF:</label><input type="text" id="cpf" style="background:#e8f5e9; border:1px solid #27ae60;"></div>
                <div class="campo" style="grid-column: span 2;"><label>NOME:</label><input type="text" id="nome"></div>
                <div class="campo"><label>EMPRESA:</label><input type="text" id="empresa"></div>
                <div class="campo"><label>RESPONSÁVEL:</label><input type="text" id="responsavel"></div>
                <div class="campo">
                    <label>LIBERADO POR:</label>
                    <select id="liberado">
                        <option value="">SELECIONE</option>
                        <option value="ACESSOS">ACESSOS</option>
                        <option value="IDENTIFICAÇÃO">IDENTIFICAÇÃO</option>
                        <option value="INSPETOR">INSPETOR</option>
                        <option value="CENTRAL">CENTRAL</option>
                        <option value="SEGURANÇA">SEGURANÇA</option>
                    </select>
                </div>
                <div class="campo">
                    <label>MOTIVO DO ACESSO:</label>
                    <select id="motivo">
                        <option value="">SELECIONE</option>
                        <option value="VISITA">VISITA</option>
                        <option value="TRABALHO">TRABALHO</option>
                        <option value="ENTREGA">ENTREGA</option>
                        <option value="OUTROS">OUTROS</option>
                    </select>
                </div>

                <div class="campo"><label>Nº CRACHÁ:</label><input type="text" id="cracha"></div>
                <div class="campo"><label>VIGILANTE:</label><input type="text" id="vigilante"></div>
                
                <div class="campo">
                    <label>ACESSO:</label>
                    <select id="tipo">
                        <option value="">SELECIONE</option>
                        <option value="ENTRADA">ENTRADA</option>
                        <option value="SAÍDA">SAÍDA</option>
                    </select>
                </div>
                <div class="campo" style="grid-column: span 3;">
                    <label>OBSERVAÇÃO:</label>
                    <input type="text" id="obs" placeholder="Detalhes importantes do acesso...">
                </div>
            </div>

            <div class="botoes">
                <button class="btn-limpar" onclick="limpar()">LIMPAR TELA</button>
                <button class="btn-relatorio" onclick="abrirBusca()">RELATÓRIO / BUSCA</button>
                <button class="btn-localizar" onclick="localizar()">LOCALIZAR</button>
                <button class="btn-salvar" onclick="salvar()">SALVAR ACESSO</button>
            </div>
        </div>
    </div>

    <div id="modal-busca">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="color:#34495e; margin: 0;">Busca e Relatório Completo</h2>
                <button class="btn-fechar" onclick="fecharBusca()">X FECHAR</button>
            </div>
            
            <div class="filtro-linha">
                <div class="filtro-item" style="width: 200px;">
                    <label>DATA INICIAL:</label>
                    <input type="date" id="filtro-inicio">
                </div>
                <div class="filtro-item" style="width: 200px;">
                    <label>DATA FINAL:</label>
                    <input type="date" id="filtro-fim">
                </div>
                <div class="filtro-item" style="width: 400px;">
                    <label>NOME/CPF/LB:</label>
                    <input type="text" id="filtro-nome">
                </div>
                <div class="botoes-filtro-modal">
                    <button class="btn-relatorio-modal" onclick="buscarRelatorio()">FILTRAR</button>
                    <button class="btn-limpar-modal" onclick="limparFiltrosBusca()">LIMPAR</button>
                </div>
            </div>

            <div class="tabela-container">
                <table id="tabela-resultados">
                    <thead>
                        <tr>
                            <th>Data</th><th>Hora</th><th>CPF</th><th>Nome</th><th>Empresa</th><th>Responsável</th><th>Liberado Por</th><th>Motivo</th><th>Vigilante</th><th>Crachá</th><th>Acesso</th><th>OBS</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            <button class="btn-exportar" onclick="exportarExcel()">GERAR EXCEL (.CSV)</button>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../conexao/config.js"></script>
<script src="../conexao/db.js"></script>
<script src="js/api.js"></script>
<script src="../js/ui.js"></script>
<script>
// Auto-login via sessão existente
// Exibe o sistema ao carregar (guard já validou a sessão)
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('sistema-principal').style.display = 'block';
    document.getElementById('nome-logado').innerText = sessionStorage.getItem('d2p-auth');
    document.body.classList.add('sistema-aberto');
});

// Logout — volta para seleção de portarias
function fazerLogout() {
  location.href = '/portarias.html';
}
</script>
</body>
</html>
