<!DOCTYPE html>
<html lang="pt-br" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Acesso - Portaria 04 - D2P</title>
    <!-- Referência ao CSS externo unificado -->
    <link rel="stylesheet" href="../css/style.css">
</head>
<body id="body-main">

    <!-- TELA DE LOGIN -->
    <div id="tela-login">
        <div class="logo-subtexto">
            SEGURANÇA PATRIMONIAL
            <span>D2P-BRAZIL</span>
        </div>
        <h2>Acesso Restrito - Portaria 04</h2>
        
        <input type="text" id="user-login" placeholder="Usuário" autocomplete="off">
        <input type="password" id="user-pass" placeholder="Senha">
        
        <button onclick="fazerLogin('p04')">ACESSAR SISTEMA</button>

        <div>
            <a href="../index.html" class="btn-voltar-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M8.707 1.5a1 1 0 0 0-1.414 0L.646 8.146a.5.5 0 0 0 .708.708L2 8.207V13.5A1.5 1.5 0 0 0 3.5 15h9a1.5 1.5 0 0 0 1.5-1.5V8.207l.646.647a.5.5 0 0 0 .708-.708L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293L8.707 1.5Z"/>
                </svg>
                VOLTAR AO MENU PRINCIPAL
            </a>
        </div>
    </div>

    <!-- SISTEMA PRINCIPAL -->
    <div id="sistema-principal" style="display: none;">
        <div class="header-usuario">
            Logado como: <b id="nome-logado">---</b> | 
            <a href="#" onclick="location.reload()">SAIR DO SISTEMA</a>
        </div>
        
        <div class="container-corporativo">
            <div class="header-sistema">
                <img src="../img/logo_horse.png" alt="Logo Horse" onerror="this.style.display='none'">
                <h1>CONTROLE DE ACESSO - P04</h1>
            </div>

            <div class="grid">
                <div class="campo">
                    <label>CPF / BPU:</label>
                    <input type="text" id="cpf">
                </div>
                <div class="campo" style="grid-column: span 2;">
                    <label>NOME COMPLETO:</label>
                    <input type="text" id="nome">
                </div>
                <div class="campo">
                    <label>EMPRESA:</label>
                    <input type="text" id="empresa">
                </div>
                <div class="campo">
                    <label>RESPONSÁVEL / ÁREA:</label>
                    <input type="text" id="responsavel">
                </div>
                <div class="campo">
                    <label>LIBERADO POR:</label>
                    <select id="liberado">
                        <option value="">SELECIONE</option>
                        <option value="ACESSOS">ACESSOS</option>
                        <option value="IDENTIFICAÇÃO">IDENTIFICAÇÃO</option>
                        <option value="INSPETOR DE VIGILANCIA">INSPETOR DE VIGILANCIA</option>
                        <option value="CENTRAL DE SEGURANÇA">CENTRAL DE SEGURANÇA</option>
                        <option value="SEGURANÇA PATRIMONIAL">SEGURANÇA PATRIMONIAL</option>
                        <option value="E-MAIL">E-MAIL</option>
                        <option value="GDV">GDV</option>
                        <option value="OUTROS">OUTROS</option>
                    </select>
                </div>
                <div class="campo">
                    <label>MOTIVO DO ACESSO:</label>
                    <select id="motivo">
                        <option value="">SELECIONE</option>
                        <option value="VISITA">VISITA</option>
                        <option value="TRABALHO">TRABALHO</option>
                        <option value="ENTREGA">ENTREGA</option>
                        <option value="OUTROS">OUTROS</option>
                        <option value="Esqueceu crachá">Esqueceu crachá</option>
                        <option value="Perdeu crachá">Perdeu crachá</option>
                        <option value="Crachá não passa">Crachá não passa</option>
                        <option value="Crachá vencido">Crachá vencido</option>
                        <option value="Pendência SG3">Pendência SG3</option>
                        <option value="Não acessou">Não acessou</option>
                        <option value="Transbordo">Transbordo</option>
                        <option value="Visita técnica">Visita técnica</option>
                        <option value="Visita a Fábrica">Visita a Fábrica</option>
                        <option value="Perícia Trabalhista">Perícia Trabalhista</option>
                        <option value="Primeiro dia de trabalho">Primeiro dia de trabalho</option>
                        <option value="Ambulatório">Ambulatório</option>
                    </select>
                </div>
                <div class="campo">
                    <label>VIGILANTE OPERADOR:</label>
                    <input type="text" id="vigilante">
                </div>
                <div class="campo">
                    <label>Nº CRACHÁ:</label>
                    <input type="text" id="cracha">
                </div>
                <div class="campo">
                    <label>TIPO DE ACESSO:</label>
                    <select id="tipo">
                        <option value="">SELECIONE</option>
                        <option value="ENTRADA">ENTRADA</option>
                        <option value="SAÍDA">SAÍDA</option>
                    </select>
                </div>
                <div class="campo" style="grid-column: span 3;">
                    <label>OBSERVAÇÃO DETALHADA:</label>
                    <input type="text" id="obs" maxlength="200" placeholder="Informações adicionais importantes...">
                </div>
            </div>

            <div class="botoes">
                <button class="btn-limpar" onclick="limpar()">LIMPAR TELA</button>
                <button class="btn-relatorio" onclick="abrirBusca()">RELATÓRIO / BUSCA</button>
                <button class="btn-localizar" onclick="localizar()">LOCALIZAR ÚLTIMO</button>
                <button class="btn-salvar" onclick="salvar()">SALVAR ACESSO</button>
            </div>
        </div>
    </div>

    <!-- MODAL DE RELATÓRIO -->
    <div id="modal-busca">
        <div class="modal-content">
            <button class="btn-fechar" onclick="fecharBusca()">FECHAR RELATÓRIO</button>
            <h2 style="color:var(--secondary-dark);">Consulta Histórica de Acessos</h2>
            
            <div class="filtro-grid">
                <div class="filtro-item">
                    <label>Data Inicial:</label>
                    <input type="date" id="filtro-inicio">
                </div>
                <div class="filtro-item">
                    <label>Data Final:</label>
                    <input type="date" id="filtro-fim">
                </div>
                <div class="filtro-item">
                    <label>Pesquisar Nome/CPF:</label>
                    <input type="text" id="filtro-nome" placeholder="Filtrar registros...">
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-relatorio" style="min-width: 100px;" onclick="buscarRelatorio()">FILTRAR</button>
                    <button class="btn-reset-busca" style="min-width: 100px; padding: 12px; border-radius: 8px; border:none; cursor:pointer;" onclick="limparFiltrosBusca()">LIMPAR</button>
                </div>
            </div>

            <div class="tabela-container">
                <table id="tabela-resultados">
                    <thead>
                        <tr>
                            <th>Data</th><th>Hora</th><th>CPF</th><th>Nome</th><th>Empresa</th><th>Responsável</th><th>Liberado Por</th><th>Motivo</th><th>Vigilante</th><th>Crachá</th><th>Acesso</th><th>OBS</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            <button class="btn-exportar" onclick="exportarExcel()">GERAR PLANILHA EXCEL (.CSV)</button>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../conexao/config.js"></script>
    <script src="../conexao/db.js"></script>
    <script src="../js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="../js/ui.js"></script>

    <script>
        function limpar() {
            document.querySelectorAll('.grid input, .grid select').forEach(el => el.value = '');
        }
        function abrirBusca() { document.getElementById('modal-busca').style.display = 'block'; }
        function fecharBusca() { document.getElementById('modal-busca').style.display = 'none'; }
        function limparFiltrosBusca() {
            document.getElementById('filtro-inicio').value = '';
            document.getElementById('filtro-fim').value = '';
            document.getElementById('filtro-nome').value = '';
            const tbody = document.querySelector('#tabela-resultados tbody');
            if (tbody) tbody.innerHTML = '';
        }

        // Mutation Observer para troca de fundo
        const observer = new MutationObserver(() => {
            const sistema = document.getElementById('sistema-principal');
            if (sistema && sistema.style.display !== 'none') {
                document.body.classList.add('sistema-aberto');
            } else {
                document.body.classList.remove('sistema-aberto');
            }
        });
        observer.observe(document.getElementById('sistema-principal'), { attributes: true, attributeFilter: ['style'] });
    </script>
</body>
</html>
